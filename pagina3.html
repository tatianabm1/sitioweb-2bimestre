<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos/estilos.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top" aria-label="Menú Principal">
        <div class="container">
            <a class="navbar-brand" href="index.html">Tecnologías Web</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Abrir menú de navegación">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="pagina2.html">Contenido principal</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="pagina3.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="page-hero">
        <div class="container">
            <h1 class="display-6">Contacto</h1>
            <hr class="accent-bar">
        </div>
    </header>

    <main class="container my-5">
        <div class="row g-4">

            <!-- Formulario -->
            <div class="col-lg-7">
                <section class="content-card p-4">
                    <span class="section-badge blue">Escríbenos</span>
                    <h2 class="fw-bold mb-4">Contáctanos</h2>
                    <form action="#" method="post" novalidate>

                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required>
                        </div>

                        <div class="mb-3">
                            <label for="correo" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="correo" name="correo" required>
                        </div>

                        <div class="mb-3">
                            <label for="asunto" class="form-label">Asunto</label>
                            <input type="text" class="form-control" id="asunto" name="asunto">
                        </div>

                        <div class="mb-4">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <textarea class="form-control" id="mensaje" name="mensaje" rows="5" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-brand btn-lg">Enviar Mensaje</button>

                    </form>
                </section>
            </div>

            <div class="col-lg-5">
                <aside class="content-card border-teal p-4 h-100">
                    <span class="section-badge teal">Enlaces útiles</span>
                    <h2 class="fw-bold mb-3">Recursos para aprender</h2>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">
                            <i class="bi bi-box-arrow-up-right me-2 text-primary" aria-hidden="true"></i>
                            <a href="https://www.w3.org/" target="_blank" rel="noopener">Sitio oficial de W3C</a>
                        </li>
                        <li class="list-group-item">
                            <i class="bi bi-box-arrow-up-right me-2 text-primary" aria-hidden="true"></i>
                            <a href="https://developer.mozilla.org/es/docs/Learn_web_development" target="_blank" rel="noopener">MDN Web Docs</a>
                        </li>
                        <li class="list-group-item">
                            <i class="bi bi-box-arrow-up-right me-2 text-primary" aria-hidden="true"></i>
                            <a href="https://whatwg.org/" target="_blank" rel="noopener">WHATWG - Estándar actual de HTML</a>
                        </li>
                        <li class="list-group-item">
                            <i class="bi bi-box-arrow-up-right me-2 text-primary" aria-hidden="true"></i>
                            <a href="https://validator.w3.org/" target="_blank" rel="noopener">Validador de W3C</a>
                        </li>
                    </ul>
                </aside>
            </div>

        </div>
    </main>

    <footer class="text-center py-4">
        <p class="mb-0">Tatiana Nayeli Manitio Basurto - 100</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
